<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Odin Sign Up</title>
</head>
<body>
    <header>
        <div class="side">
            <img src="odin-lined.png" alt="Odin Logo" id="logo">
            <h1>ODIN</h1>   
        </div>
    </header>
    
    <main>
        <div class="top">
            <p>This is not a real online service! You know you need something like this in your life to help you realise your deepest dreams.</p>
            <p>You <em>know</em> you want to.</p>
        </div>

        <div class="formSection">
            <h2>Let's do this!</h2>
            <form action="">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName">
                <label for="lastNmae">Last Name</label>
                <input type="text" id="lastName">
                <label for="email">Email</label>
                <input type="email" id="email">
                <label for="phone">Phone Number</label>
                <input type="number" id="phone">
                <label for="password">Password</label>
                <input type="password" id="password">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword">
            </form>
            <button type="submit">Create Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
        </div>
    </main>

</body>

</html>
