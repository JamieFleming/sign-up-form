<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Odin Sign Up</title>
</head>
<body>
    <header>
        <div class="title">
            <img src="odin-lined.png" alt="Odin Logo" id="logo">
            <h1>ODIN</h1>   
        </div>
        <p id="credit">Photo by <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Unsplash</a></p>
    </header>
    
    <main>
        <div class="top">
            <p>This is not a real online service! You know you need something like this in your life to help you realise your deepest dreams.</p>
            <p>You <em>know</em> you want to.</p>
        </div>

        <div class="form-section">
            <h2>Let's do this!</h2>
            <form action="">
                <div class="form-info">
                    <div class="form-elements">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName">
                    </div>
                    <div class="form-elements">
                        <label for="lastNmae">Last Name</label>
                        <input type="text" id="lastName">
                    </div>
                </div>
                <div class="form-info">
                    <div class="form-elements">
                        <label for="email">Email</label>
                        <input type="email" id="email">
                    </div>
                    <div class="form-elements">
                        <label for="phone">Phone Number</label>
                        <input type="number" id="phone">
                    </div>
                </div>
                <div class="form-info">
                    <div class="form-elements">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="password" minlength="8"
    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$"
    title="At least 8 characters, with uppercase, lowercase, number, and special character." required>
                    </div>
                    <div class="form-elements">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="password" minlength="8"
    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$"
    title="At least 8 characters, with uppercase, lowercase, number, and special character." required>
                    </div>
                </div>
            </form>
        </div>
        <div class="createButton">
            <button type="submit" id="create">Create Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
        </div>
    </main>

</body>

</html>
